services:
  app:
    image: ${APP_IMAGE:-chat-agent:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command:
      - sh
      - -c
      - exec uvicorn app.main:app --host ${APP_HOST:-0.0.0.0} --port ${APP_PORT:-8000}
    working_dir: /workspace
    init: true
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      APP_NAME: ${APP_NAME:-chat-agent-backend}
      APP_ENV: ${APP_ENV:-local}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chat_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      REDIS_URL: redis://redis:6379/0
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-http://ragflow:9380}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-replace-me}
      RAGFLOW_USE_LLM: ${RAGFLOW_USE_LLM:-true}
      DEFAULT_KNOWLEDGE_DATASET_ID: ${DEFAULT_KNOWLEDGE_DATASET_ID:-}
      LIVE_AGENT_BASE_URL: ${LIVE_AGENT_BASE_URL:-http://localhost:8081}
      LIVE_AGENT_TIMEOUT_SECONDS: ${LIVE_AGENT_TIMEOUT_SECONDS:-15}
      MCP_SERVERS_JSON: ${MCP_SERVERS_JSON:-[]}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-replace-me}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      PLANNER_MODEL: ${PLANNER_MODEL:-}
      PLANNER_BASE_URL: ${PLANNER_BASE_URL:-}
      PLANNER_API_KEY: ${PLANNER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=3)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chat_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
